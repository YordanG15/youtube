<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        
        /* Contenedor de la cuadrícula inspirado en image_cbea26.png */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px 0;
        }

        /* Estilo de las miniaturas */
        .video-card {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .video-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .video-card img {
            width: 100%;
            border-radius: 4px;
        }

        /* Modal para ver el video sin salir de la página */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
      <main>
        <div class="category-section">
            <h2 class="category-title">🫀 Fisiología Cardiovascular</h2>
            <div class="video-grid">
                <div class="video-card" onclick="openVideo('G43CsQI91ec')">
                    <img src="https://img.youtube.com/vi/G43CsQI91ec/maxresdefault.jpg" alt="Cardio 1">
                    <p>Potencial de Acción Cardíaco</p>
                </div>
                </div>
        </div>

        <div class="category-section">
            <h2 class="category-title">🧬 Fisiología Renal</h2>
            <div class="video-grid">
                <div class="video-card" onclick="openVideo('ID_VIDEO_RENAL')">
                    <img src="https://img.youtube.com/vi/ID_VIDEO_RENAL/maxresdefault.jpg" alt="Renal 1">
                    <p>Mecanismo de Filtración Glomerular</p>
                </div>
            </div>
        </div>

        <div class="category-section">
            <h2 class="category-title">⚖️ Fisiología Homeostasis</h2>
            <div class="video-grid">
                <div class="video-card" onclick="openVideo('ID_VIDEO_HOMEOSTASIS')">
                    <img src="https://img.youtube.com/vi/ID_VIDEO_HOMEOSTASIS/maxresdefault.jpg" alt="Homeostasis 1">
                    <p>Sistemas de Retroalimentación</p>
                </div>
            </div>
        </div>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideo()">&times;</span>
            <iframe id="videoPlayer" width="100%" height="400px" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function openVideo(videoId) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            player.src = "https://www.youtube.com/embed/" + videoId;
            modal.style.display = "flex";
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            player.src = "";
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('videoModal');
            if (event.target == modal) {
                closeVideo();
            }
        }
    </script>
</body>
</html>
